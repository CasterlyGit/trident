name: ci
on:
  push:
    branches: [master, selfloop/auto]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install pytest
      - name: Run tests
        run: python3 -m pytest tests -q
