name: ci
on:
  push:
    branches: [master, selfloop/auto]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install pytest
      - name: Run tests
        # Two tests are host-environment-coupled (local wallet/handoff state)
        # and pass only on the real machine — deselected here, run locally.
        run: >
          python3 -m pytest tests -q
          --deselect tests/test_wall.py::TestWallCheck::test_fires_at_threshold_with_sessions_and_handoffs
          --deselect tests/test_wave1.py::TestMint::test_tick_writes_wallet
